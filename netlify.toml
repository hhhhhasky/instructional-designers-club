[build]
  command = "npm run build"
  publish = "dist"

# 设置环境变量
[build.environment]
  NODE_VERSION = "18"

# 重定向规则
[[redirects]]
  from = "/f85bf832844871219822203c7edba3b1.txt"
  to = "/f85bf832844871219822203c7edba3b1.txt"
  status = 200
  force = false

[[redirects]]
  from = "/80c26dc8a6320a9717670f56027ee3c6.txt"
  to = "/80c26dc8a6320a9717670f56027ee3c6.txt"
  status = 200
  force = false

# SPA 路由 - 所有其他请求重定向到 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 头部设置
[[headers]]
  for = "/*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"
